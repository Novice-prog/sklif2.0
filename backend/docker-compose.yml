services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinical_data
      POSTGRES_USER: clinical_user
      POSTGRES_PASSWORD: clinical_pass
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical_user -d clinical_data"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://clinical_user:clinical_pass@db:5432/clinical_data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
